    <style>

    </style>

    <body>
        <div class="wrap">
            <main class="contentWrap guide">
                <div class="visual-content">
                    <h2>
                        <em>Toggle</em>
                    </h2>
                </div>
                <div class="sample-content">
                    <div class="tit-wrap">
                        <h3>Check text</h3>
                        <div>
                            <div class="form-container">
                                <div class="form-content">
                                    <p style="margin-bottom:10px;">기본 체크박스</p>
                                    <div class="form-wrap">
                                        <div class="form-group">
                                            <fieldset>
                                                <legend>기본 체크박스</legend>
                                                <label class="check">
                                                    <input type="checkbox" name="row1-active" value="" checked>
                                                    <span>Check Box ON</span>
                                                </label>
    
                                                <label class="check">
                                                    <input type="checkbox" name="row1-active" value="">
                                                    <span>Check Box OFF</span>
                                                </label>
    
                                                <label class="check">
                                                    <input type="checkbox" name="row1-active" value="" checked disabled>
                                                    <span>Check Box Disable-checked</span>
                                                </label>
                                            </fieldset>
                                        </div>
                                        <div class="form-group">
                                            <fieldset>
                                                <legend>기본 체크박스</legend>
                                              
                                                <div class="check-item style2">
                                                    <input type="checkbox" name="row1-active" id="row1_active_1" value="" checked>
                                                    <label for="row1_active_1" class="check">
                                                        <span>Check Box ON</span>
                                                    </label>
                                                </div>
                                              
                                                <div class="check-item style2">
                                                    <input type="checkbox" name="row1-active" id="row1_active_2" value="">
                                                    <label for="row1_active_2" class="check">
                                                    <span>Check Box OFF</span>
                                                    </label>
                                                </div>
                                              
                                                <div class="check-item style2">
                                                    <input type="checkbox" name="row1-active" id="row1_active_3" value="" checked disabled>
                                                    <label for="row1_active_3" class="check">
                                                    <span>Check Box Disable-checked</span>
                                                    </label>
                                                </div>
                                            </fieldset>
                                        </div>
                                    </div>
                                </div>
                                <!--//form-content-->
                            </div>
                        </div>
                    </div>
                    <div class="tit-wrap">
                        <h3>Radio text</h3>
                        <div>
                            <div class="form-container">
                                <div class="form-content">
                                    <p style="margin-bottom:10px;">기본 체크박스</p>
                                    <div class="form-wrap">
                                        <div class="form-group">
                                            <fieldset>
                                                <legend>기본 라디오 박스</legend>
                                                <label class="radio">
                                                    <input type="radio" name="row2-active" value="" checked>
                                                    <span>Check Box ON</span>
                                                </label>
    
                                                <label class="radio">
                                                    <input type="radio" name="row2-active" value="">
                                                    <span>Check Box OFF</span>
                                                </label>

                                                <label class="radio">
                                                    <input type="radio" name="row2-active" value="" disabled>
                                                    <span>Check Box Disable-checked</span>
                                                </label>
                                            </fieldset>
                                        </div>
                                        <div class="form-group">
                                            <fieldset>
                                                <legend>기본 라디오 박스</legend>

                                                <div class="radio-item style2">
                                                    <input type="radio" name="row3-active" id="row2_active_1" value="" checked>
                                                    <label for="row2_active_1" class="radio">
                                                        <span>Check Box ON</span>
                                                    </label>
                                                </div>

                                                <div class="radio-item style2">
                                                    <input type="radio" name="row3-active" id="row2_active_2" value="">
                                                    <label for="row2_active_2" class="radio">
                                                        <span>Check Box OFF</span>
                                                    </label>
                                                </div>

                                                <div class="radio-item style2">
                                                    <input type="radio" name="row3-active" id="row2_active_3" value="" disabled>
                                                    <label for="row2_active_3" class="radio">
                                                        <span>Check Box Disable-checked</span>
                                                    </label>
                                                </div>
                                            </fieldset>
                                        </div>
                                    </div>
                                    <p style="margin-bottom:10px;">style2</p>
                                    <div class="form-wrap">
                                        <div class="form-group r-button">
                                            <label class="radio">
                                                <input type="radio" name="style2" id="style2" value="1" checked="">
                                                <span>label > input</span>
                                            </label>
                                            <label class="radio">
                                                <input type="radio" name="style2" id="style2" value="0">
                                                <span>label > input</span>
                                            </label>
                                        </div>
                                        <div class="form-group r-button">
                                            <div class="radio-item">
                                                <input type="radio" name="style2-1" id="style2-1" value="1" checked>
                                                <label for="style2-1" class="radio">
                                                    <span>input + label</span>
                                                </label>
                                            </div>

                                            <div class="radio-item">
                                                <input type="radio" name="style2-1" id="style2-2" value="0">
                                                <label for="style2-2" class="radio">
                                                    <span>input + label</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!--//form-content-->
                            </div>
                        </div>
                    </div>
                    <div class="tit-wrap">
                        <h3>Toggle</h3>
                        <div>
                            <div class="form-container">
                                <div class="form-content">
                                    <div class="form-wrap">
                                        <div class="form-group">
                                            <p style="margin-bottom:10px;">기본</p>
                                            <label class="toggle">
                                                <input type="checkbox" name="row3-active" title="체크" value="" checked>
                                                <span>선택</span>
                                            </label>
                                        </div>
                                        <div class="form-group">
                                            <p style="margin-bottom:10px;">disabled</p>
                                            <label class="toggle">
                                                <input type="checkbox" name="row3-active" title="체크" value="" disabled>
                                                <span>선택안함</span>
                                            </label>
                                        </div>
                                        <div class="form-group">
                                            <p style="margin-bottom:10px;">텍스트</p>
                                            <label class="toggle style2">
                                                <input type="checkbox" name="row3-active" id="fontSizeNormal" title="텍스트" value="">
                                                <span>텍스트</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <!--//form-content-->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
